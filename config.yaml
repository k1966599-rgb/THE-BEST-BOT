# Configuration file for the Elliott Wave Analysis Bot

# 0. Telegram Bot Credentials
telegram:
  # The token is now loaded from the .env file for security
  token: null
  chat_id: "782008836"

# 1. Scanner Configuration
scanner:
  interval_seconds: 900 # Time in seconds between each full scan of all symbols
  notify_on_no_setups: true # Send a message even if no opportunities are found
  symbols_to_scan:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - XRPUSDT
    - DOGEUSDT
    - ADAUSDT
    - AVAXUSDT
    - TRXUSDT
    - DOTUSDT
    - LINKUSDT
    - MATICUSDT
    - SHIBUSDT
    - LTCUSDT
    - BCHUSDT
    - UNIUSDT
    - ATOMUSDT
    - ETCUSDT
    - XLMUSDT
    - NEARUSDT
    - ALGOUSDT
    - VETUSDT
    - ICPUSDT
    - FILUSDT
    - EOSUSDT
    - XTZUSDT
    - AAVEUSDT
    - MKRUSDT
    - FTMUSDT
    - SANDUSDT
    - MANAUSDT

# 2. Pivot Detection Settings
pivot_sensitivity:
  default: 4.0

# 3. Elliott Wave Pattern Rules & Guidelines
elliott_wave:
  motive_wave:
    w2_retracement: {min: 0.382, max: 0.618}
    w3_extension: {min: 1.618}
    w4_retracement: {min: 0.236, max: 0.382}
  zigzag:
    b_retracement: {max: 0.618}
  flat:
    b_retracement_min: 0.90
    regular_flat_b_retrace_max: 1.05

# 4. Technical Indicator Settings
indicators:
  rsi: {period: 14}
  macd: {fast: 12, slow: 26, signal: 9}

# 5. Risk Management Settings
risk:
  account_size: 10000  # Total account value in USD for position sizing
  risk_per_trade: 0.01 # e.g., 0.01 means 1% risk per trade

# 6. General Trading Rules
trading_rules:
  min_rr_ratio: 2.0         # Minimum Risk/Reward ratio to accept a trade
  min_confidence_score: 70  # Minimum confidence score (out of 100) to accept a trade
  max_trades_per_day: 3     # Maximum number of new trades to open per day to avoid over-trading
  max_opportunity_age_hours: 24 # Max hours to keep a deferred opportunity before it expires
